<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Oblikovati CalculiX">
  <rect width="64" height="64" rx="12" fill="#1f2430"/>
  <!-- cantilever beam under load with a stress gradient and deflection -->
  <rect x="12" y="20" width="6" height="24" fill="#c8cdd8"/>
  <!-- beam: green (low stress) at the tip → red (high stress) at the fixed root -->
  <defs>
    <linearGradient id="vm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e5484d"/>
      <stop offset="0.5" stop-color="#f5d90a"/>
      <stop offset="1" stop-color="#3ddc97"/>
    </linearGradient>
  </defs>
  <path d="M18 26 H50 a3 3 0 0 1 3 3 q-2 6 -6 9 H18 Z" fill="url(#vm)"/>
  <!-- downward tip load arrow -->
  <path d="M50 14 V24 M46 20 l4 4 4 -4" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
